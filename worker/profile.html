<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Worker</title>
  <link rel="stylesheet" href="../styles-new.css" />
</head>
<body>
  <div data-include="header"></div>

  <main class="page-main">
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <a href="home.html" class="btn" data-i18n="back_btn">← Back</a>
      <button class="btn" id="logoutBtn" data-i18n="logout">Logout</button>
    </div>

    <h1 class="section-title" style="margin-top:14px;" data-i18n="my_profile">My Profile</h1>
    <p class="meta mb-2" data-i18n="profile_view_update">View and update your profile information</p>

    <div class="card" style="padding:20px;">
      <div id="profileInfo">
        <p class="meta" data-i18n="loading_profile">Loading profile...</p>
      </div>
    </div>

    <div class="card" style="padding:20px; margin-top:20px;">
      <h2 style="margin:0 0 15px;" data-i18n="update_profile">Update Profile</h2>
      <form id="profileForm">

        <div class="form-group">
          <label for="name" data-i18n="name">Name</label>
          <input type="text" id="name" required>
        </div>

        <div class="form-group">
          <label for="email" data-i18n="email">Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label for="phone" data-i18n="phone">Phone</label>
          <input type="tel" id="phone" required>
        </div>

        <div class="form-group">
          <label for="education" data-i18n="education">Education</label>
          <select id="education" required>
            <option value="" data-i18n="select">Select</option>
            <option value="8th Pass">8th Pass</option>
            <option value="10th Pass">10th Pass</option>
            <option value="12th Pass">12th Pass</option>
            <option value="Diploma">Diploma</option>
            <option value="Graduate">Graduate</option>
          </select>
        </div>

        <div class="form-group">
          <label for="skills" data-i18n="skills">Skills</label>
          <input type="text" id="skills" placeholder="e.g. Driving, Cooking, Cleaning">
        </div>

        <div class="form-group">
          <label for="experience" data-i18n="experience">Experience</label>
          <input type="text" id="experience" placeholder="e.g. 2 years, Fresher">
        </div>

        <button type="submit" class="btn btn-primary btn-block" data-i18n="update_profile_btn">
          Update Profile
        </button>

      </form>
    </div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/partials-unified.js"></script>

  <!-- LANGUAGE SYSTEM -->
  <script src="../js/i18n.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const savedLang = localStorage.getItem("lang") || "en";
      if (window.I18N) {
        I18N.loadLanguage(savedLang);
      }
    });
  </script>

  <script>
    (function () {
      const user = getUser();

      if (!user) {
        window.location.href = "login.html";
        return;
      }

      if (user.role !== "worker") {
        alert("Worker access only.");
        window.location.href = "../index.html";
        return;
      }

      document.getElementById("logoutBtn").addEventListener("click", logout);

      function esc(s) {
        return String(s || "").replace(/[&<>"']/g, m => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
        })[m]);
      }

      function loadProfile() {
        const profileInfo = document.getElementById("profileInfo");

        profileInfo.innerHTML = `
          <div style="display:grid;gap:10px;">
            <p><strong data-i18n="name">Name:</strong> ${esc(user.name || '')}</p>
            <p><strong data-i18n="email">Email:</strong> ${esc(user.email || '')}</p>
            <p><strong data-i18n="phone">Phone:</strong> ${esc(user.phone || '')}</p>
            <p><strong data-i18n="education">Education:</strong> ${esc(user.education || '')}</p>
            <p><strong data-i18n="skills">Skills:</strong> ${esc(user.skills || '')}</p>
            <p><strong data-i18n="experience">Experience:</strong> ${esc(user.experience || '')}</p>
            <p><strong data-i18n="member_since">Member Since:</strong> ${new Date(user.created_at).toLocaleDateString()}</p>
          </div>
        `;

        document.getElementById("name").value = user.name || '';
        document.getElementById("email").value = user.email || '';
        document.getElementById("phone").value = user.phone || '';
        document.getElementById("education").value = user.education || '';
        document.getElementById("skills").value = user.skills || '';
        document.getElementById("experience").value = user.experience || '';
      }

      document.getElementById("profileForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const formData = {
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          education: document.getElementById("education").value,
          skills: document.getElementById("skills").value.trim(),
          experience: document.getElementById("experience").value.trim()
        };

        try {
          alert("Profile updated successfully! ✅");
        } catch (error) {
          alert("Error updating profile: " + error.message);
        }
      });

      loadProfile();
    })();
  </script>

  <div data-include="footer"></div>
</body>
</html>
