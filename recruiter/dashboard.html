<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="dashboard_title">Recruiter Dashboard</title>
  <link rel="stylesheet" href="../styles-new.css" />
</head>
<body>
  <div data-include="header"></div>

  <main class="page-main">
    <h1 class="section-title" data-i18n="dashboard_title">Recruiter Dashboard</h1>
    <p class="meta mb-2" data-i18n="dashboard_desc">Post jobs, manage your posts, and check applications.</p>

    <div class="card" style="padding:16px;">
      <div class="top-row">
      <a class="btn btn-primary" href="dashboard.html" data-i18n="nav_dashboard">📊 Dashboard</a>
      <a class="btn btn-primary" href="post-job.html" data-i18n="nav_post_job">➕ Post Job</a>
      <a class="btn btn-primary" href="job-management.html" data-i18n="nav_job_management">⚙️ Job Management</a>
      <a class="btn btn-primary" href="candidate-matching.html" data-i18n="nav_candidate_matching">🎯 Candidate Matching</a>
      <a class="btn btn-primary" href="analytics.html" data-i18n="nav_analytics">📈 Analytics</a>
      <a class="btn btn-primary" href="communication.html" data-i18n="nav_communication">💬 Communication</a>
      <button class="btn" id="logoutBtn" data-i18n="logout">Logout</button>

      <!-- ADDED LANGUAGE DROPDOWN INLINE -->
      <select id="langSelectInline" class="btn" style="margin-left:8px;">
        <option value="english">English</option>
        <option value="hindi">हिन्दी</option>
        <option value="bengali">বাংলা</option>
        <option value="gujarati">ગુજરાતી</option>
        <option value="kannada">ಕನ್ನಡ</option>
        <option value="malayalam">മലയാളം</option>
        <option value="marathi">मराठी</option>
        <option value="odia">ଓଡ଼ିଆ</option>
        <option value="punjabi">ਪੰਜਾਬੀ</option>
        <option value="tamil">தமிழ்</option>
        <option value="telugu">తెలుగు</option>
        <option value="assamese">অসমীয়া</option>
      </select>

      
    </div>

      <p class="meta mt-2" id="who"></p>
    </div>

    <h2 class="section-title mt-3" data-i18n="my_jobs">My Posted Jobs</h2>
    <div id="myJobs" class="grid"></div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/partials-unified.js"></script>

  <script>
    (function () {
      const user = getUser();

      if (!user) {
        window.location.href = "login.html";
        return;
      }

      if (user.role === "employer") {
        user.role = "recruiter";
        try { setUser(user); } catch(e){}
      }

      if (user.role !== "recruiter") {
        alert("Recruiter access only.");
        window.location.href = "../index.html";
        return;
      }

      document.getElementById("logoutBtn").addEventListener("click", logout);
      document.getElementById("who").textContent =
        `Logged in as: ${user.name} (${user.email})`;

      function esc(s){
        return String(s||"").replace(/[&<>"']/g, m =>
          ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m])
        );
      }

      function jobCard(job){
        const status = job.status || 'active';
        const statusColor = status === 'expired' ? '#ffc107' : (status === 'closed' ? '#6c757d' : '#28a745');
        const statusText = status === 'expired' ? 'Expired' : (status === 'closed' ? 'Closed' : 'Active');
        const hasStatusField = job.hasOwnProperty('status');

        return `
          <div class="card job-card" style="padding:14px;">
            <h3 style="margin:0 0 6px;">${esc(job.title)}</h3>
            <p class="meta">${esc(job.company)} • ${esc(job.location)}</p>
            ${job.category ? `<p class="meta"><strong data-i18n="category">Category:</strong> ${esc(job.category)}</p>` : ""}
            ${hasStatusField ? `<p class="meta"><strong data-i18n="status">Status:</strong> <span style="color:${statusColor};font-weight:bold;">${statusText}</span></p>` : ''}
            <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">
              <a class="btn btn-primary" href="applications.html?job_id=${job.id}" data-i18n="view_applications">
                View Applications
              </a>
              <button class="btn" onclick="updateJobStatus(${job.id}, 'expired')" data-i18n="expired">
  ⏰ Expired
</button>

<button class="btn" onclick="updateJobStatus(${job.id}, 'closed')" data-i18n="closed">
  🔒 Closed
</button>

<button class="btn" onclick="updateJobStatus(${job.id}, 'active')" data-i18n="active">
  ✅ Active
</button>

<button class="btn" onclick="deleteJob(${job.id})" data-i18n="delete">
  🗑️ Delete
</button>
              </button>
            </div>
          </div>
        `;
      }

      async function loadMyJobs(){
        const box = document.getElementById("myJobs");
        box.innerHTML = `<p class="meta" data-i18n="loading_jobs">Loading your jobs...</p>`;

        try{
          const res = await fetch(API(`jobs_list?created_by=${encodeURIComponent(user.id)}`));
          const responseText = await res.text();
          let data;
          try {
            data = JSON.parse(responseText);
          } catch (parseErr) {
            box.innerHTML = `<p class="meta" data-i18n="error_invalid_json">Invalid JSON</p>`;
            return;
          }

          if(!data.ok){
            box.innerHTML = `<p class="meta" data-i18n="error_load_jobs">Failed to load jobs</p>`;
            return;
          }

          let jobs = (data.jobs || []);

          if(jobs.length === 0){
            box.innerHTML = `<p class="meta" data-i18n="no_jobs_posted">No jobs posted yet</p>`;
            return;
          }

          box.innerHTML = jobs.map(jobCard).join("");

        }catch(e){
          box.innerHTML = `<p class="meta" data-i18n="error_server_refresh">Server error</p>`;
        }
      }

      loadMyJobs();

      async function deleteJob(jobId) {
        if (!confirm("Are you sure you want to delete this job? This action cannot be undone.")) {
          return;
        }

        try {
          const response = await postJSON("jobs_delete", { id: jobId });

          if (response.ok) {
            alert("Job deleted successfully!");
            loadMyJobs();
          } else {
            alert("Failed to delete job");
          }
        } catch (error) {
          alert("Server error. Please try again.");
        }
      }

      async function updateJobStatus(jobId, newStatus) {
        const statusText = newStatus === 'expired' ? 'expired' : (newStatus === 'closed' ? 'closed' : 'active');

        if (!confirm(`Are you sure you want to mark this job as ${statusText}?`)) {
          return;
        }

        try {
          const response = await postJSON("jobs_status", {
            id: jobId,
            status: newStatus
          });

          if (response.ok) {
            alert(`Job marked as ${statusText} successfully!`);
            loadMyJobs();
          } else {
            alert("Failed to update job status");
          }
        } catch (error) {
          alert("Server error. Please try again.");
        }
      }

      window.deleteJob = deleteJob;
      window.updateJobStatus = updateJobStatus;
    })();
  </script>

  <!-- FINAL LANGUAGE SYSTEM -->
 <script>
document.addEventListener("DOMContentLoaded", () => {

  async function applyLang() {
    const lang = localStorage.getItem("lang") || "english";

    const res = await fetch(`/i18n/${lang}.json`);
    const t = await res.json();

    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");

      if (!t[key]) return;

      // 🔥 REMOVE OLD TEXT COMPLETELY
      let emoji = el.innerText.match(/^[^\w\s]+/);

      el.innerText = emoji
        ? emoji[0] + " " + t[key]
        : t[key];
    });
  }

  const dropdown = document.getElementById("langSelectInline");

  if (dropdown) {
    dropdown.value = localStorage.getItem("lang") || "english";

    dropdown.addEventListener("change", function(){
      localStorage.setItem("lang", this.value);

      // 🔥 FORCE FULL CLEAN RELOAD (VERY IMPORTANT)
      location.reload();
    });
  }

  applyLang();
});
</script>
  <div data-include="footer"></div>
</body>
</html>
